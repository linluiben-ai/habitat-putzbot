name: Putzplan Automation

on:
  schedule:
    # GitHub Actions Cron läuft in UTC.
    # '0 8 * * 1' bedeutet: montags um 08:00 UTC.
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  run-putzbot:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v5

      - name: Python aufsetzen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Bibliotheken installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Skript ausführen
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          DS_A_ID: ${{ secrets.DS_A_ID }}
          DS_B_ID: ${{ secrets.DS_B_ID }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
        run: python main.py
